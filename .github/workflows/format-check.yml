name: format-check

on:
  pull_request:
    branches:
      - main
      - dev
    paths:
      - "**/*.ts"
      - "**/*.tsx"
      - "**/*.js"
      - "**/*.jsx"
      - "**/*.mjs"
      - "**/*.cjs"
      - "**/*.json"
      - "**/*.md"
      - "**/*.mdx"
      - "**/*.css"
      - "**/*.yml"
      - "**/*.yaml"
      - "package.json"
      - "package-lock.json"
      - ".prettierrc*"
      - ".prettierignore"

jobs:
  prettier:
    name: prettier
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check
