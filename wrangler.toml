name = "divine-wiki"
main = ".open-next/worker.js"
compatibility_date = "2026-06-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Workers deploy via the OpenNext adapter (@opennextjs/cloudflare).
# `npm run deploy` builds the app into .open-next/ and ships it as one Worker:
# frontend, /api/* routes, and i18n middleware all run here. Build output is
# generated, so .open-next/ is gitignored.

# Static assets (the built Next.js client bundle + public/) served from the edge.
[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Binds the production hostname straight to this Worker. Requires divineskins.gg
# to be a zone on this Cloudflare account; the record + TLS cert are created on
# first deploy.
routes = [
  { pattern = "wiki.divineskins.gg", custom_domain = true }
]

# Public, non-secret build-time config (mirrors .env.example). Real secrets, if
# any are ever needed, go in the dashboard or `wrangler secret put`, never here.
[vars]
NEXT_PUBLIC_BASE_URL = "https://wiki.divineskins.gg"
NEXT_PUBLIC_DIVINE_API_URL = "https://api.divineskins.gg"
